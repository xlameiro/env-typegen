# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud analysis configuration
# https://sonarcloud.io/documentation/project-administration/narrowing-the-focus/
#
# NOTE: sonar.projectKey and sonar.organization are set through the SonarCloud
# web UI (or GitHub App integration) — no need to duplicate them here unless
# you need to override them.
# ──────────────────────────────────────────────────────────────────────────────

# ── Sources ───────────────────────────────────────────────────────────────────
# Only analyse production source directories.
sonar.sources=app,auth.ts,components,hooks,lib,proxy.ts,store,types

# ── Tests ─────────────────────────────────────────────────────────────────────
# Files matching sonar.test.inclusions are analysed as test code and do NOT
# count toward the LOC limit on the free plan.
sonar.tests=app,components,hooks,lib,store,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,tests/**/*.spec.ts

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────────────────
# Excluded from analysis entirely — not counted in LOC.
#
# The biggest wins for the freemium LOC limit:
#   **/*.md        — documentation (AGENTS.md, README.md, instruction files,
#                    SKILL.md files, etc.) can be thousands of lines
#   pnpm-lock.yaml — auto-generated lockfile, not application code
sonar.exclusions=\
  **/*.md,\
  **/*.mdx,\
  pnpm-lock.yaml,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  public/**,\
  scripts/**,\
  .agents/**,\
  .github/**,\
  .husky/**,\
  .next/**
