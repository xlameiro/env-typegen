# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud analysis configuration
# https://sonarcloud.io/documentation/project-administration/narrowing-the-focus/
#
# NOTE: sonar.projectKey and sonar.organization are set through the SonarCloud
# web UI (or GitHub App integration) — no need to duplicate them here unless
# you need to override them.
# ──────────────────────────────────────────────────────────────────────────────

# ── Sources ───────────────────────────────────────────────────────────────────
# Only analyse production source directories.
sonar.sources=app,components,lib,proxy.ts,store,scripts,packages

# ── Coverage ──────────────────────────────────────────────────────────────────
# Coverage is imported from the pre-generated lcov report (produced by
# `pnpm test:coverage` / Vitest). Test source files are excluded from analysis
# (see sonar.exclusions below) — this is intentional: SonarCloud counts ALL
# scanned files toward the freemium LOC limit, including files listed under
# sonar.tests. Importing the lcov report is sufficient for coverage metrics
# without inflating the LOC count.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────────────────
# Excluded from analysis entirely — not counted in LOC.
#
# Key wins for the freemium LOC limit:
#   *.test.ts/tsx, *.spec.ts  — test files: biggest single source of LOC in a
#                               well-tested project; coverage comes from lcov
#   tests/**                  — Playwright E2E specs
#   **/*.md / **/*.mdx        — docs: AGENTS.md, README.md, SKILL.md files, etc.
#   **/*.json / **/*.yaml     — config files scanned by SonarCloud IaC plugin
#   pnpm-lock.yaml            — auto-generated, not application code
sonar.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  tests/**,\
  **/*.md,\
  **/*.mdx,\
  **/*.json,\
  **/*.yaml,\
  **/*.yml,\
  pnpm-lock.yaml,\
  coverage/**,\
  playwright-report/**,\
  test-results/**,\
  public/**,\
  scripts/**,\
  .agents/**,\
  .github/**,\
  .husky/**,\
  .next/**
