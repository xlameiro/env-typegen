name: CodeQL Security Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  # Same pattern as ci.yml: group by target branch so rapid pushes/PRs
  # targeting main cancel older in-progress runs. Schedule runs use ref_name
  # (the default branch) as the group, which is correct.
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript / TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          languages: javascript-typescript
          # Optional: add custom CodeQL query suites for extended coverage
          # queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        # ⚠️  SECURITY ACTION REQUIRED: Remove 'continue-on-error: true' once Code Scanning
        # is enabled in this repository (Settings → Security → Code scanning → Enable).
        # While this flag is set, CodeQL findings will NOT block PRs — a security risk.
        # This flag is present in the template only so the workflow does not break for repos
        # that have not yet enabled Code Scanning. Remove it in production.
        continue-on-error: true
        with:
          category: /language:javascript-typescript
