name: Dependabot auto-merge

on: pull_request

permissions: read-all

jobs:
  auto-merge:
    name: Auto-merge minor and patch updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    # IMPORTANT: auto-merge merges only after all required status checks pass.
    # This job relies on branch protection rules being configured on `main` to
    # require the CI workflow (ci.yml) as a mandatory check. Without branch
    # protection, `gh pr merge --auto` will merge immediately regardless of CI.
    # Configure at: Settings → Branches → Branch protection rules → Require
    # status checks to pass before merging → select the CI workflow jobs.

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge minor and patch updates — major versions require manual review
      - name: Enable auto-merge
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr checks "$PR_URL" --watch --required
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
