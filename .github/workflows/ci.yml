name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Group by workflow + target branch so that push-to-main events and all
  # pull_request events targeting the same branch share one concurrency slot.
  # A new push/PR cancels any in-progress run targeting the same branch.
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate docs source
        run: pnpm generate

      - name: Security audit
        run: pnpm audit --audit-level=moderate

      - name: Check for deprecated packages
        run: |
          node -e "
          const https = require('https');
          const pkg = require('./package.json');
          const deps = [
            ...Object.keys(pkg.dependencies || {}),
            ...Object.keys(pkg.devDependencies || {}),
          ];
          let found = 0;
          const check = (name) => new Promise((resolve) => {
            const url = 'https://registry.npmjs.org/' + encodeURIComponent(name) + '/latest';
            https.get(url, (res) => {
              let data = '';
              res.on('data', (c) => (data += c));
              res.on('end', () => {
                try {
                  const meta = JSON.parse(data);
                  if (meta.deprecated) {
                    console.error('DEPRECATED: ' + name + '@' + meta.version + ': ' + meta.deprecated);
                    found++;
                  }
                } catch (e) {}
                resolve();
              });
            }).on('error', resolve);
          });
          Promise.all(deps.map(check)).then(() => process.exit(found > 0 ? 1 : 0));
          "

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Dead code detection
        run: pnpm knip

      - name: Unit tests with coverage gate
        run: pnpm test:coverage

      - name: Build
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        run: pnpm build

  env-typegen-matrix:
    name: env-typegen (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint env-typegen
        run: pnpm --filter @xlameiro/env-typegen lint

      - name: Type-check env-typegen
        run: pnpm --filter @xlameiro/env-typegen type-check

      - name: Test env-typegen (Node 18)
        if: matrix.node == 18
        run: pnpm --filter @xlameiro/env-typegen test

      - name: Test env-typegen with coverage
        if: matrix.node != 18
        run: pnpm --filter @xlameiro/env-typegen test:coverage

      - name: Build env-typegen
        run: pnpm --filter @xlameiro/env-typegen build

      - name: Upload coverage to Codecov
        if: matrix.node != 18
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: packages/env-typegen/coverage/lcov.info
          flags: env-typegen
          fail_ci_if_error: false

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers + system deps
        # Full install only on cache miss — downloads ~100 MB browser binary + apt packages.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        # Browser binary is cached; only install apt system libraries (~1–2 min vs ~8 min).
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
