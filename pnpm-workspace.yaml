# pnpm workspace configuration.
# This file is kept even in single-package repos because ignoredBuiltDependencies
# is a workspace-level setting — it cannot be placed in package.json.
#
# ignoredBuiltDependencies: suppresses noisy/failed postinstall scripts for packages
# that do not require a build step in this project's environment.
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
